<!DOCTYPE html>
<html>
<head>
    <title>Cartly</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Favicon (browser tab) -->
    <link rel="icon" type="image/png" href="Cartly_Tab_V1.png">

    <!-- PWA manifest -->
    <link rel="manifest" href="./manifest.json">

    <!-- iOS home screen icon -->
    <link rel="apple-touch-icon" sizes="180x180" href="Cartly_Homepage_V1.png">

    <!-- Android / PWA icons -->
    <link rel="icon" type="image/png" sizes="192x192" href="Cartly_Homepage_V1.png">
    <link rel="icon" type="image/png" sizes="512x512" href="Cartly_Homepage_V1.png">

    <!-- Theme color -->
    <meta name="theme-color" content="#ffffff">

    <style>
        body {
            background: #fafafa;
            font-family: Arial;
            padding: 12px;
            margin: 0;
            max-width: 700px;
        }

        input, button, select {
            padding: 14px;
            margin: 6px 0;
            width: 100%;
            font-size: 16px;
        }

        .item {
            border-bottom: 1px solid #ccc;
            padding: 8px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        .item button {
            width: auto;
            padding: 8px 12px;
            margin: 0;
        }

        .tracker-item {
            padding: 10px;
            border-radius: 4px;
        }

        @media (max-width: 600px) {
            .item {
                flex-direction: column;
                align-items: flex-start;
            }
        }

        .tabs {
            display: flex;
            gap: 6px;
        }

        .tabs button {
            flex: 1;
        }

        .tab { display: none; }
        .active { display: block; }

        .in-pantry {
            background: #ff9797;
            border-left: 4px solid red;
        }

        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            padding: 20px;
            width: 90%;
            max-width: 400px;
            border-radius: 10px;
        }
    </style>
</head>
    
<body>

    <h2>Cartly</h2>

    <div id="alertBox"></div>

    <div id="addModal" class="modal">
        <div class="modal-content">
            <h3>Add Item</h3>

            <input id="modalName" placeholder="Item name">
            <input id="modalPrice" type="number" placeholder="Price">

            <select id="modalCategory">
                <option>Groceries</option>
                <option>Snacks</option>
                <option>Other</option>
            </select>

            <input id="modalExpiration" type="date">
            <button onclick="submitModalItem()">Add</button>
            <button onclick="closeAddPopup()">Cancel</button>
        </div>
    </div>

    <div class="tabs">
        <button onclick="showTab('tracker')">Tracker</button>
        <button onclick="showTab('graph')">Graph</button>
        <button onclick="showTab('list')">Shopping List</button>
    </div>

    <!-- TRACKER -->
    <div id="tracker" class="tab active">

        <!-- Receipt scan -->
        <input type="file" accept="image/*" onchange="handleReceiptUpload(this.files[0])">
        <button onclick="openAddPopup()">Add Manual</button>

        <h3>Items</h3>
        <div id="listDisplay"></div>

        <h3>💰 Total: $<span id="total">0</span></h3>
    </div>

    <!-- GRAPH -->
    <div id="graph" class="tab">
        <canvas id="chart"></canvas>
    </div>

    <!-- SHOPPING LIST -->
    <div id="list" class="tab">
        <input id="listItem" placeholder="Add grocery item">
        <button onclick="addToList()">Add to List</button>

        <h3>🛒 Your List</h3>
        <div id="shoppingList"></div>
    </div>


    <script>
        let items = [];
        let shoppingList = [];
        let chartInstance = null;
        let categories = [];

        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1mY296bWZoYnlmanR5ZXJlcWdnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0MTk2OTcsImV4cCI6MjA5Mjk5NTY5N30.wY9WR1fpWSIt_ad9Zs_XzAcKB7cCROVIt7ZJTD6Lgv0";
        const supabaseServer = supabase.createClient(
            "https://mfcozmfhbyfjtyereqgg.supabase.co",
            SUPABASE_ANON_KEY
        );

        // ---------------- ALERT ----------------
        function showAlert(msg) {
            const box = document.getElementById("alertBox");
            box.innerText = msg;
            box.style.display = "block";

            setTimeout(() => {
                box.style.display = "none";
            }, 3000);
        }

        // ---------------- LOAD ITEMS ----------------
        async function loadItems() {
            const { data, error } = await supabaseServer
                .from("items")
                .select("*");

            if (error) {
                console.error(error);
                return;
            }

            items = data || [];
            render();
        }

                // ---------------- GEMINI ----------------
        async function scanReceipt(imageBase64) {
            const controller = new AbortController();

            // cancel request after 15 seconds
            setTimeout(() => controller.abort(), 15000);

            try {
                const res = await fetch("https://mfcozmfhbyfjtyereqgg.functions.supabase.co/gemini-scan", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "apikey": SUPABASE_ANON_KEY,
                        "Authorization": `Bearer ${SUPABASE_ANON_KEY}`
                    },
                    body: JSON.stringify({
                        imageBase64: imageBase64
                    }),
                    signal: controller.signal
                });

                if (!res.ok) {
                    const text = await res.text();
                    console.error("Edge Function error:", text);
                    console.error("Status:", res.status);
                    throw new Error(`API Error ${res.status}: ${text}`);
                }

                const data = await res.json();
                console.log("Full Gemini response:", JSON.stringify(data, null, 2));

                // Handle blocked content or missing response
                if (data.promptFeedback?.blockReason) {
                    throw new Error(`Content blocked: ${data.promptFeedback.blockReason}`);
                }

                if (!data.candidates || !data.candidates[0]) {
                    throw new Error("No candidates in response");
                }

                const candidate = data.candidates[0];
                
                if (candidate.finishReason !== "STOP") {
                    throw new Error(`Unexpected finish reason: ${candidate.finishReason}`);
                }

                let text = candidate.content?.parts?.[0]?.text;

                if (!text) {
                    console.error("Candidate structure:", JSON.stringify(candidate, null, 2));
                    throw new Error("No text found in response");
                }

                text = text.replace(/```json|```/g, "").trim();
                const parsed = JSON.parse(text);
                
                if (!Array.isArray(parsed)) {
                    throw new Error("Response is not an array of items");
                }

                return parsed;
            } catch (error) {
                console.error("Scan error:", error);
                throw error;
            }
        }

                // ---------------- IMAGE UPLOAD FLOW ----------------
        async function handleReceiptUpload(file) {
            try {
                if (!file) {
                    showAlert("No file selected");
                    return;
                }

                showAlert("Processing receipt...");
                
                const compressed = await compressImage(file);
                const base64 = await toBase64(compressed);

                const extractedItems = await scanReceipt(base64);

                const cleaned = extractedItems.map(i => {
                    // Convert expiration text to date
                    let expirationDate = null;
                    if (i.expiration) {
                        const match = i.expiration.match(/(\d+)\s*days?/i);
                        if (match) {
                            const days = parseInt(match[1]);
                            const date = new Date();
                            date.setDate(date.getDate() + days);
                            expirationDate = date.toISOString().split('T')[0];
                        }
                    }

                    return {
                        name: i.name || "Unknown",
                        price: Number(i.price) || 0,
                        category: i.category || "Other",
                        expiration: expirationDate,
                        instock: true,
                        createdate: new Date().toISOString()
                    };
                });

                await supabaseServer.from("items").insert(cleaned);

                await loadItems();
                showAlert("Receipt added successfully!");
            } catch (error) {
                console.error("Receipt upload error:", error);
                showAlert("Error: " + error.message);
            }
        }

        // ---------------- BASE64 ----------------
        function toBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();

                reader.onload = () => {
                    resolve(reader.result.split(",")[1]);
                };

                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        // ---------------- IMAGE COMPRESS ----------------
        async function compressImage(file) {
            const quality = 0.7;

            return new Promise((resolve, reject) => {
                const img = new Image();

                img.onload = () => {
                    const canvas = document.createElement("canvas");
                    const ctx = canvas.getContext("2d");

                    const maxWidth = 1000;
                    const scale = Math.min(maxWidth / img.width, 1);

                    canvas.width = img.width * scale;
                    canvas.height = img.height * scale;

                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

                    canvas.toBlob(blob => {
                        if (!blob) return reject("Compression failed");
                        resolve(blob);
                    }, "image/jpeg", quality);
                };

                img.onerror = reject;
                img.src = URL.createObjectURL(file);
            });
        }

        // ---------------- ADD ITEM ----------------
        async function addItem(item) {
            const { data, error } = await supabaseServer
                .from("items")
                .insert([{
                    name: item.name,
                    price: item.price,
                    category: item.category,
                    expiration: item.expiration || null,
                    instock: true,
                    createdate: new Date().toISOString()
                }])
                .select();

            if (error) {
                console.error("Insert error:", error);
                return;
            }

            console.log("Inserted row:", data);
            await loadItems();
        }

        async function submitModalItem() {
            const name = document.getElementById("modalName").value.trim();
            const price = parseFloat(document.getElementById("modalPrice").value);
            const category = document.getElementById("modalCategory").value;
            const expiration = document.getElementById("modalExpiration").value;

            if (!name || isNaN(price)) {
                showAlert("Fill all fields");
                return;
            }

            await addItem({
                name,
                price,
                category,
                expiration: expiration || null
            });

            document.getElementById("modalName").value = "";
            document.getElementById("modalPrice").value = "";
            document.getElementById("modalExpiration").value = "";

            closeAddPopup();
            render();
        }

        // ---------------- REMOVE / MARK ----------------
        async function markRemoved(name) {
            await supabaseServer
                .from("items")
                .update({ instock: false })
                .eq("name", name);

            await loadItems();
        }

        // ---------------- SHOPPING LIST ----------------
        async function addToList(name) {
            if (!name) {
                const el = document.getElementById("listItem");
                name = (el.value || "").trim();
                if (!name) return showAlert("Enter item");
                el.value = "";
            }

            // Check if item already exists in purchased items within expiration
            const existingItem = items.find(i => 
                i.instock && 
                i.name.toLowerCase() === name.toLowerCase() &&
                (!i.expiration || new Date(i.expiration) > new Date())
            );

            if (existingItem) {
                showAlert(`⚠️ "${existingItem.name}" already purchased! Expires: ${existingItem.expiration || "No expiration"}`);
                shoppingList.push({ name, isDuplicate: true });
            } else {
                shoppingList.push({ name, isDuplicate: false });
            }

            renderList();
        }

        async function removeFromList(name) {
            shoppingList = shoppingList.filter(i => i.name.toLowerCase() !== name.toLowerCase());
            renderList();
        }

        // ---------------- RENDER ITEMS ----------------
        function render() {
            const list = document.getElementById("listDisplay");
            const totalEl = document.getElementById("total");

            list.innerHTML = "";
            let total = 0;

            items.forEach(i => {
                if (i.instock) {
                    total += Number(i.price) || 0;

                    list.innerHTML += `
                        <div class="item tracker-item">
                            <div>
                                <strong>${i.name}</strong> - $${i.price} (${i.category})
                            </div>
                        </div>
                    `;
                }
            });

            totalEl.innerText = total.toFixed(2);
            renderChart();
        }

        function openAddPopup() {
            document.getElementById("addModal").style.display = "flex";
        }
        function closeAddPopup() {
            document.getElementById("addModal").style.display = "none";
        }
        function showTab(tabName) {
            const tabs = document.querySelectorAll(".tab");
            tabs.forEach(tab => tab.classList.remove("active"));
            document.getElementById(tabName).classList.add("active");
        }

        // ---------------- SHOPPING LIST RENDER ----------------
        function renderList() {
            const listDiv = document.getElementById("shoppingList");
            listDiv.innerHTML = "";

            shoppingList.forEach(item => {
                const itemObj = typeof item === 'string' ? { name: item, isDuplicate: false } : item;
                listDiv.innerHTML += `
                    <div class="item" style="${itemObj.isDuplicate ? 'background: #ffcccc; border-left: 4px solid red;' : ''}">
                        <div>${itemObj.name}</div>
                        <button onclick="removeFromList('${itemObj.name}')">Remove</button>
                    </div>
                `;
            });
        }

        // ---------------- CHART ----------------
        function renderChart() {
            const ctx = document.getElementById("chart").getContext("2d");

            const totals = {};

            items.forEach(i => {
                if (i.instock) {
                    totals[i.category] = (totals[i.category] || 0) + Number(i.price);
                }
            });

            if (window.chartInstance) window.chartInstance.destroy();

            window.chartInstance = new Chart(ctx, {
                type: "bar",
                data: {
                    labels: Object.keys(totals),
                    datasets: [{
                        label: "Spending",
                        data: Object.values(totals)
                    }]
                }
            });
        }

        // ---------------- INIT (FIXED) ----------------
        window.onload = async () => {
            await loadItems();
        };
    </script>

</body>
</html>
