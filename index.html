<!DOCTYPE html>
<html>
<head>
    <title>Cartly</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Favicon (browser tab) -->
    <link rel="icon" type="image/png" href="Cartly_Tab_V1.png">

    <!-- PWA manifest -->
    <link rel="manifest" href="./manifest.json">

    <!-- iOS home screen icon -->
    <link rel="apple-touch-icon" sizes="180x180" href="Cartly_Homepage_V1.png">

    <!-- Android / PWA icons -->
    <link rel="icon" type="image/png" sizes="192x192" href="Cartly_Homepage_V1.png">
    <link rel="icon" type="image/png" sizes="512x512" href="Cartly_Homepage_V1-512.png">

    <!-- Theme color -->
    <meta name="theme-color" content="#ffffff">

    <style>
        body {
            background: #fafafa;
            font-family: Arial;
            padding: 12px;
            margin: 0;
            max-width: 700px;
        }

        input, button, select {
            padding: 14px;
            margin: 6px 0;
            width: 100%;
            font-size: 16px;
            box-sizing: border-box;
        }

        .modal-content input,
        .modal-content button,
        .modal-content select {
            padding: 10px;
            margin: 6px 0;
            font-size: 14px;
        }

        .item {
            border-bottom: 1px solid #ccc;
            padding: 8px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        .item button {
            width: auto;
            padding: 8px 12px;
            margin: 0;
        }

        .tracker-item {
            padding: 10px;
            border-radius: 4px;
        }

        @media (max-width: 600px) {
            .item {
                flex-direction: column;
                align-items: flex-start;
            }
        }

        .tabs {
            display: flex;
            gap: 6px;
        }

        .tabs button {
            flex: 1;
        }

        .tab { display: none; }
        .active { display: block; }

        .in-pantry {
            background: #ff9797;
            border-left: 4px solid red;
        }

        /* Modal background */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(4px);
        }

        /* Modal card */
        .modal-content {
            background: white;
            padding: 20px;
            width: 90%;
            max-width: 400px;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.15);
            animation: fadeIn 0.2s ease;
        }

        /* Title */
        .modal-title {
            margin-bottom: 12px;
            font-size: 18px;
            font-weight: 600;
        }

        /* Form layout */
        .form-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 12px;
        }

        .form-group label {
            font-size: 13px;
            color: #666;
            margin-bottom: 4px;
        }

        /* Inputs */
        .form-group input,
        .form-group select {
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ddd;
            font-size: 14px;
            outline: none;
        }

        .form-group input:focus,
        .form-group select:focus {
            border-color: #2e7d32;
            box-shadow: 0 0 0 2px rgba(46,125,50,0.15);
        }

        /* Buttons layout */
        .modal-actions {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin-top: 10px;
        }

        /* Cancel button */
        .cancel-btn {
            flex: 1;
            background: #eee;
            border: none;
            border-radius: 10px;
            padding: 10px;
        }

        /* Add button */
        .add-btn {
            flex: 1;
            background: #2e7d32;
            color: white;
            border: none;
            border-radius: 10px;
            padding: 10px;
            font-weight: 600;
        }

        /* Hover/press */
        .add-btn:active {
            transform: scale(0.97);
        }

        .cancel-btn:active {
            transform: scale(0.97);
        }

        /* Animation */
        @keyframes fadeIn {
            from { transform: translateY(10px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        #alertBox {
            display: none;
            background: #ffcccc;
            border-left: 4px solid red;
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 10px;
        }

        #SuccessBox {
            display: none;
            background: rgb(212, 255, 204);
            border-left: 4px solid #2e7d32;
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 10px;
            color: #1b5e20;
        }

        .item-card {
            background: white;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 10px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }

        .top-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .item-name {
            font-weight: 600;
            font-size: 16px;
        }

        .item-price {
            font-weight: 600;
            color: #2e7d32;
        }

        .bottom-row {
            margin-top: 4px;
            font-size: 13px;
            color: #777;
        }


        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-around;
            background: white;
            border-top: 1px solid #ddd;
            padding: 6px 0;
            box-shadow: 0 -2px 6px rgba(0,0,0,0.05);
        }

        .bottom-nav button {
            flex: 1;
            background: none;
            border: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 14px;
            color: #777;
            padding: 8px;
            cursor: pointer;
        }

        .bottom-nav button span {
            font-size: 11px;
        }

        .bottom-nav button.active {
            color: #2e7d32;
            font-weight: 600;
            border: 2px solid #2e7d32;
            border-radius: 8px;
        }

        body {
            padding-bottom: 80px;
        }

        .file-input-wrapper {
            position: relative;
            display: block;
            margin-bottom: 12px;
        }

        .file-input-label {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 20px;
            background: white;
            border: 2px dashed #2e7d32;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            color: #2e7d32;
            transition: all 0.2s;
        }

        .file-input-label:hover {
            background: #f0f8f0;
            border-color: #1b5e20;
        }

        .file-input-label:active {
            transform: scale(0.98);
        }

        .file-input-label.scanning {
            background: #e8f5e9;
            border-color: #1b5e20;
            color: #1b5e20;
        }

        #receiptInput {
            display: none;
        }

        #fab {
            position: fixed;
            bottom: 90px;
            right: 20px;

            width: 52px;
            height: 52px;
            border-radius: 50%;

            background: #2e7d32;
            color: white;
            border: none;

            display: flex;
            align-items: center;
            justify-content: center;

            font-size: 28px;

            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            z-index: 1000;

            transition: all 0.25s ease;
        }

        /* EXPANDED (manual mode) */
        #fab.fab-expanded {
            width: 160px;
            height: 52px;
            border-radius: 14px;

            justify-content: center;
            gap: 6px;

            font-size: 16px;
        }

        #fab:hover {
            transform: scale(1.05);
        }

        #fab:active {
            transform: scale(0.92);
        }

    </style>
</head>
    
<body>

    <h2>Cartly</h2>
    <button id="fab" onclick="openAddPopup('manual')">
        <span>+</span>
        <span id="fabText" style="display:none; font-size:14px; margin-left:8px;">
            Add
        </span>
    </button>
    <div id="alertBox"></div>
    <div id="SuccessBox"></div>

    <div id="addModal" class="modal">
        <div class="modal-content">
            <h3 class="modal-title">
                Add Item
                <span id="modeLabel" style="font-size:12px; color:#999;"></span>
            </h3>

            <div class="form-group">
                <label>Name</label>
                <input id="modalName" placeholder="e.g. Milk">
            </div>

            <div class="form-group">
                <label>Price</label>
                <input id="modalPrice" type="number" placeholder="0.00">
            </div>

            <div class="form-group">
                <label>Category</label>
                <select id="modalCategory">
                    <option>Groceries</option>
                    <option>Snacks</option>
                    <option>Drinks</option>
                    <option>Household</option>
                    <option>Personal Care</option>
                    <option>Electronics</option>
                    <option>Fast Food</option>
                    <option>Restaurants</option>
                    <option>Other</option>
                </select>
            </div>

            <div class="form-group">
                <label>Expiration</label>
                <input id="modalExpiration" type="date">
            </div>

            <div class="modal-actions">
                <button class="cancel-btn" onclick="closeAddPopup()">Cancel</button>
                <button class="add-btn" onclick="submitModalItem()">Add Item</button>
            </div>
        </div>
    </div>

    <!-- TRACKER -->
    <div id="tracker" class="tab active">
        <label class="file-input-wrapper">
            <div class="file-input-label" id="scanLabel">
                📸 Tap to take photo or upload receipt
            </div>
            <input id="receiptInput" type="file" accept="image/*" capture="environment" onchange="handleReceiptUpload(this.files[0])">
        </label>

        <h3>Items</h3>
        <div id="listDisplay"></div>

        <h3>💰 Total: $<span id="total">0</span></h3>
    </div>

    <!-- GRAPH -->
    <div id="insight" class="tab">
        <h3>💸 Category Limits</h3>

        <select id="limitCategory">
            <option>Groceries</option>
            <option>Snacks</option>
            <option>Electronics</option>
            <option>Fast Food</option>
            <option>Restaurants</option>
            <option>Other</option>
        </select>

        <input id="limitAmount" type="number" placeholder="Set monthly limit ($)">

        <button onclick="saveLimit()">Save Limit</button>

        <p id="currentLimit"></p>

        <h3>📊 Spending Over Time</h3>

        <select id="timeRange">
            <option value="7">1 Week</option>
            <option value="30">1 Month</option>
            <option value="180">6 Months</option>
            <option value="365">1 Year</option>
        </select>

        <select id="filterCategory">
            <option value="all">All Categories</option>
            <option>Groceries</option>
            <option>Snacks</option>
            <option>Electronics</option>
            <option>Fast Food</option>
            <option>Restaurants</option>
        </select>

        <input id="filterItem" placeholder="Filter by item name (optional)">

        <canvas id="timeChart"></canvas>
    </div>

    <!-- SHOPPING LIST -->
    <div id="list" class="tab">
        <input id="listItem" placeholder="Add grocery item">
        <button onclick="addToList()">Add to List</button>

        <h3>🛒 Your List</h3>
        <div id="shoppingList"></div>
    </div>

    <div class="bottom-nav">
        <button onclick="showTab('tracker')" id="tab-tracker" class="active">
            📦
            <span>Tracker</span>
        </button>
        <button onclick="showTab('insight')" id="tab-insight">
            📊
            <span>Insights</span>
        </button>
        <button onclick="showTab('list')" id="tab-list">
            🛒
            <span>List</span>
        </button>
    </div>

    <script>
        // ---------------- VARIABLES ----------------
        let items = [];
        let shoppingList = [];
        let chartInstance = null;
        let categories = [];
        let addMode = "scan"; // or "manual"
        let scanInterval = null;
        let categoryLimits = {};

        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1mY296bWZoYnlmanR5ZXJlcWdnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0MTk2OTcsImV4cCI6MjA5Mjk5NTY5N30.wY9WR1fpWSIt_ad9Zs_XzAcKB7cCROVIt7ZJTD6Lgv0";
        const supabaseServer = supabase.createClient(
            "https://mfcozmfhbyfjtyereqgg.supabase.co",
            SUPABASE_ANON_KEY
        );

        // ---------------- ALERT ----------------
        function showAlert(msg) {
            const box = document.getElementById("alertBox");
            box.innerText = msg;
            box.style.display = "block";

            setTimeout(() => {
                box.style.display = "none";
            }, 3000);
        }

        function showSuccess(msg) {
            const box = document.getElementById("SuccessBox");
            box.innerText = msg;
            box.style.display = "block";

            setTimeout(() => {
                box.style.display = "none";
            }, 3000);
        }

        function startScanAnimation() {
            const label = document.getElementById("scanLabel");
            let dots = 0;

            label.classList.add("scanning");

            scanInterval = setInterval(() => {
                dots = (dots + 1) % 3;
                label.innerText = "🔍 Scanning" + ".".repeat(dots + 1);
            }, 400);
        }

        function stopScanAnimation() {
            const label = document.getElementById("scanLabel");

            clearInterval(scanInterval);
            scanInterval = null;

            label.classList.remove("scanning");
            label.innerText = "📸 Tap to take photo or upload receipt";
        }

        // ---------------- LOAD ITEMS ----------------
        async function loadItems() {
            const { data, error } = await supabaseServer
                .from("items")
                .select("*");

            if (error) {
                console.error(error);
                return;
            }

            items = data || [];
            render();
        }

                // ---------------- GEMINI ----------------
        async function scanReceipt(imageBase64) {
            try {
                const res = await fetch("https://mfcozmfhbyfjtyereqgg.functions.supabase.co/gemini-scan", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "apikey": SUPABASE_ANON_KEY,
                        "Authorization": `Bearer ${SUPABASE_ANON_KEY}`
                    },
                    body: JSON.stringify({
                        imageBase64: imageBase64
                    })
                });

                if (!res.ok) {
                    const errText = await res.text();
                    console.error("HTTP ERROR:", res.status, errText);
                    throw new Error(`Server error ${res.status}`);
                }

                const rawText = await res.text();

                let data;
                try {
                    data = JSON.parse(rawText);
                } catch (e) {
                    console.error("Invalid JSON response:", rawText);
                    throw new Error("Invalid JSON from server");
                }

                if (!data.candidates || !data.candidates[0]) {
                    throw new Error("No candidates in response");
                }

                const candidate = data.candidates[0];
                let text = candidate.content?.parts?.[0]?.text;

                if (!text) {
                    throw new Error("No text found in response");
                }

                text = text.replace(/```json|```/g, "").trim();

                const parsed = JSON.parse(text);

                if (!Array.isArray(parsed)) {
                    throw new Error("Response is not an array");
                }

                return parsed;

            } catch (error) {
                console.error("Scan error:", error);
                throw error;
            }
        }

                // ---------------- IMAGE UPLOAD FLOW ----------------
        async function handleReceiptUpload(file) {

            // 🚨 BLOCK SCAN IF USER IS IN MANUAL MODE
            if (addMode === "manual") return;
                try {
                    if (!file) {
                        showAlert("No file selected");
                        return;
                    }

                    startScanAnimation();
                    
                    const compressed = await compressImage(file);
                    const base64 = await toBase64(compressed);

                    const extractedItems = await scanReceipt(base64);

                    const cleaned = extractedItems.map(i => ({
                        name: i.name || "Unknown",
                        price: Number(i.price) || 0,
                        category: i.category || "Other",
                        expiration: i.expiration || null,
                        instock: true,
                        createdate: new Date().toISOString()
                    }));

                    await supabaseServer.from("items").insert(cleaned);

                    await loadItems();
                    stopScanAnimation();
                    showSuccess("Receipt added successfully!");
                } catch (error) {
                        console.error("Receipt upload error:", error);
                        stopScanAnimation();
                        showAlert("Error: " + error.message);
                }
        }

        // ---------------- BASE64 ----------------
        function toBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();

                reader.onload = () => {
                    resolve(reader.result.split(",")[1]);
                };

                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        // ---------------- IMAGE COMPRESS ----------------
        async function compressImage(file) {
            const quality = 0.7;

            return new Promise((resolve, reject) => {
                const img = new Image();

                img.onload = () => {
                    const canvas = document.createElement("canvas");
                    const ctx = canvas.getContext("2d");

                    const maxWidth = 1000;
                    const scale = Math.min(maxWidth / img.width, 1);

                    canvas.width = img.width * scale;
                    canvas.height = img.height * scale;

                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

                    canvas.toBlob(blob => {
                        if (!blob) return reject("Compression failed");
                        resolve(blob);
                    }, "image/jpeg", quality);
                };

                img.onerror = reject;
                img.src = URL.createObjectURL(file);
            });
        }

        // ---------------- INSIGHTS ----------------
        function saveLimit() {
            const category = document.getElementById("limitCategory").value;
            const amount = parseFloat(document.getElementById("limitAmount").value);

            if (isNaN(amount)) {
                showAlert("Enter valid amount");
                return;
            }

            categoryLimits[category] = amount;

            localStorage.setItem("categoryLimits", JSON.stringify(categoryLimits));

            showSuccess(`Limit set for ${category}: $${amount}`);
            updateCurrentLimit();
        }

        function updateCurrentLimit() {
            const category = document.getElementById("limitCategory").value;
            const limit = categoryLimits[category];

            document.getElementById("currentLimit").innerText =
                limit ? `Current limit: $${limit}` : "No limit set";
        }

        function setupInsightListeners() {
            document.getElementById("timeRange").addEventListener("change", renderTimeGraph);
            document.getElementById("filterCategory").addEventListener("change", renderTimeGraph);
            document.getElementById("filterItem").addEventListener("input", renderTimeGraph);
        }

        // ---------------- ADD ITEM ----------------
        async function addItem(item) {
            const { data, error } = await supabaseServer
                .from("items")
                .insert([{
                    name: item.name,
                    price: item.price,
                    category: item.category,
                    expiration: item.expiration || null,
                    instock: true,
                    createdate: new Date().toISOString()
                }])
                .select();

            if (error) {
                console.error("Insert error:", error);
                return;
            }

            console.log("Inserted row:", data);
            await loadItems();
        }

        async function submitModalItem() {
            const name = document.getElementById("modalName").value.trim();
            const price = parseFloat(document.getElementById("modalPrice").value);
            const category = document.getElementById("modalCategory").value;
            const expiration = document.getElementById("modalExpiration").value;

            if (!name || isNaN(price)) {
                showAlert("Fill all fields");
                return;
            }

            await addItem({
                name,
                price,
                category,
                expiration: expiration || null
            });

            document.getElementById("modalName").value = "";
            document.getElementById("modalPrice").value = "";
            document.getElementById("modalExpiration").value = "";

            closeAddPopup();
            render();
        }

        // ---------------- REMOVE / MARK ----------------
        async function markRemoved(name) {
            await supabaseServer
                .from("items")
                .update({ instock: false })
                .eq("name", name);

            await loadItems();
        }

        // ---------------- SHOPPING LIST ----------------
        async function addToList(name) {
            if (!name) {
                const el = document.getElementById("listItem");
                name = (el.value || "").trim();
                if (!name) return showAlert("Enter item");
                el.value = "";
            }

            // Check if item already exists in purchased items within expiration
            const existingItem = items.find(i => 
                i.instock && 
                i.name.toLowerCase() === name.toLowerCase() &&
                (!i.expiration || new Date(i.expiration) > new Date())
            );

            if (existingItem) {
                showAlert(`"${existingItem.name}" already purchased! Expires: ${existingItem.expiration || "No expiration"}`);
                shoppingList.push({ name, isDuplicate: true });
            } else {
                shoppingList.push({ name, isDuplicate: false });
            }

            renderList();
        }

        async function removeFromList(name) {
            shoppingList = shoppingList.filter(i => {
                const itemName = typeof i === "string" ? i : i.name;
                return itemName.toLowerCase() !== name.toLowerCase();
            });

            renderList();
        }

        async function markRanOut(id) {
            const { error } = await supabaseServer
                .from("items")
                .update({ instock: false })
                .eq("id", id);

            if (error) {
                console.error("Update failed:", error);
                showAlert("Failed to update item");
                return;
            }

            showSuccess("Marked as ran out");
            console.log("Updating item:", name);
            await loadItems();
        }

        // ---------------- RENDER ITEMS ----------------
        function formatDate(dateStr) {
            if (!dateStr) return "N/A";
            const date = new Date(dateStr);
            return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        }

        function capitalize(str) {
            return str.charAt(0).toUpperCase() + str.slice(1).toLowerCase();
        }

        function render() {
            const list = document.getElementById("listDisplay");
            const totalEl = document.getElementById("total");

            list.innerHTML = "";
            let total = 0;

            // ✅ CREATE categoryTotals HERE
            const categoryTotals = {};

            items.forEach(i => {
                if (i.instock) {
                    total += Number(i.price) || 0;

                    // ✅ accumulate per category
                    const cat = i.category || "Other";
                    categoryTotals[cat] = (categoryTotals[cat] || 0) + Number(i.price);

                    list.innerHTML += `
                        <div class="item-card">
                            <div class="top-row">
                                <span class="item-name">${capitalize(i.name)}</span>
                                <span class="item-price">$${Number(i.price).toFixed(2)}</span>
                            </div>
                            <div class="bottom-row">
                                ${i.category} • Expires ${formatDate(i.expiration)}
                            </div>
                        </div>
                    `;
                } else {
                    list.innerHTML += `
                        <div class="item-card" style="opacity:0.5">
                            <div class="top-row">
                                <span class="item-name"><s>${capitalize(i.name)}</s></span>
                            </div>
                            <div class="bottom-row">(Out of stock)</div>
                        </div>
                    `;
                }
            });

            // ✅ CHECK LIMITS AFTER LOOP
            for (let category in categoryTotals) {
                const total = categoryTotals[category];
                const limit = categoryLimits[category];

                if (limit && total > limit) {
                    showAlert(`⚠️ ${category} exceeded limit ($${total.toFixed(2)} / $${limit})`);
                }
            }

            totalEl.innerText = total.toFixed(2);
        }

        function openAddPopup(mode = "scan") {
            addMode = mode;

            const fab = document.getElementById("fab");
            const text = document.getElementById("fabText");

            // open modal
            document.getElementById("addModal").style.display = "flex";

            // visual change
            if (mode === "manual") {
                fab.classList.add("fab-expanded");
                if (text) text.style.display = "block";
            } else {
                fab.classList.remove("fab-expanded");
                if (text) text.style.display = "none";
            }

            // optional label update
            const label = document.getElementById("modeLabel");
            if (label) {
                label.innerText = mode === "manual" ? "Manual Entry" : "Scan Mode";
            }
        }

        function closeAddPopup() {
            document.getElementById("addModal").style.display = "none";
        }
        function showTab(tabName) {
            const tabs = document.querySelectorAll(".tab");
            tabs.forEach(tab => tab.classList.remove("active"));
            document.getElementById(tabName).classList.add("active");

            const buttons = document.querySelectorAll(".bottom-nav button");
            buttons.forEach(btn => btn.classList.remove("active"));
            document.getElementById("tab-" + tabName).classList.add("active");

            if (tabName === "insight") {
                renderTimeGraph(); // auto-load graph
            }
        }

        // ---------------- SHOPPING LIST RENDER ----------------
        function renderList() {
            const listDiv = document.getElementById("shoppingList");
            listDiv.innerHTML = "";

            shoppingList.forEach(item => {
                const itemObj = typeof item === 'string'
                    ? { name: item, isDuplicate: false }
                    : item;

                listDiv.innerHTML += `
                    <div class="item-card" style="${itemObj.isDuplicate ? 'border-left: 4px solid red;' : ''}">
                        <div class="top-row">
                            <span class="item-name">${capitalize(itemObj.name)}</span>
                        </div>

                        <div class="bottom-row">
                            ${itemObj.isDuplicate ? "⚠️ Already in pantry" : "Shopping item"}
                        </div>

                        <div style="margin-top:8px; display:flex; gap:6px;">
                            <button onclick="removeFromList('${itemObj.name}')">Remove</button>
                            <button onclick="markRanOut('${i.id}')">Ran Out</button>
                        </div>
                    </div>
                `;
            });
        }

        // ---------------- CHART ----------------
        function renderTimeGraph() {
            const days = parseInt(document.getElementById("timeRange").value || 7);
            const categoryFilter = document.getElementById("filterCategory").value;
            const itemFilter = document.getElementById("filterItem").value.toLowerCase();

            const now = new Date();
            const past = new Date();
            past.setDate(now.getDate() - days);

            const filtered = items.filter(i => {
                const date = new Date(i.createdate);

                return (
                    date >= past &&
                    (categoryFilter === "all" || i.category === categoryFilter) &&
                    (!itemFilter || i.name.toLowerCase().includes(itemFilter))
                );
            });

            // Group by day
            const totals = {};

            filtered.forEach(i => {
                const date = new Date(i.createdate).toISOString().split("T")[0];

                totals[date] = (totals[date] || 0) + Number(i.price);
            });

            const labels = Object.keys(totals)
                .sort((a, b) => new Date(a) - new Date(b));
            const data = labels.map(d => totals[d]);

            const ctx = document.getElementById("timeChart").getContext("2d");

            if (window.timeChartInstance) window.timeChartInstance.destroy();

            window.timeChartInstance = new Chart(ctx, {
                type: "line",
                data: {
                    labels,
                    datasets: [{
                        label: "Spending",
                        data
                    }]
                }
            });
        }

        // ---------------- SCROLL FADE FAB ----------------
        window.addEventListener("scroll", () => {
            const fab = document.getElementById("fab");
            const fadeStart = 50;
            const fadeEnd = 200;

            const scrollY = window.scrollY;

            if (scrollY < fadeStart) {
                fab.style.opacity = 1;
            } else if (scrollY > fadeEnd) {
                fab.style.opacity = 0;
            } else {
                fab.style.opacity = 1 - (scrollY - fadeStart) / (fadeEnd - fadeStart);
            }
        });

        // ---------------- INIT (FIXED) ----------------
        window.onload = async () => {
            await loadItems();
            setupInsightListeners();
        };
    </script>
</body>
</html>
